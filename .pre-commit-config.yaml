repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.2
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix]
      # Run the formatter
      - id: ruff-format
  - repo: local
    hooks:
      - id: dco-sign-off
        name: DCO Sign-off Check
        entry: "bash -c 'grep -q \"^Signed-off-by: \" \"$1\"' --"
        language: system
        stages: [commit-msg]
